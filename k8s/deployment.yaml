apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-crash-app
  labels:
    app: flask-crash-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-crash-app
  template:
    metadata:
      labels:
        app: flask-crash-app
    spec:
      containers:
      - name: flask-app
        image: yanivno/my-app:1.0
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: PORT
          value: "5000"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      restartPolicy: Always
